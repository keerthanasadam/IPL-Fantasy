services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ipl_fantasy
      POSTGRES_USER: ipl
      POSTGRES_PASSWORD: ipl_secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl -d ipl_fantasy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ipl:ipl_secret@db:5432/ipl_fantasy
      DATABASE_URL_SYNC: postgresql://ipl:ipl_secret@db:5432/ipl_fantasy
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
