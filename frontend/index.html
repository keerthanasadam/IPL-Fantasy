<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPL Fantasy League</title>
    <style>
      /* ── Theme tokens ── */
      :root, html[data-theme="dark"] {
        --bg-primary:        #0f172a;
        --bg-card:           #1e293b;
        --bg-input:          #0f172a;
        --bg-secondary:      #334155;
        --bg-secondary-hover:#475569;
        --text-primary:      #e2e8f0;
        --text-muted:        #94a3b8;
        --text-subtle:       #64748b;
        --text-heading-2:    #e2e8f0;
        --text-heading-3:    #cbd5e1;
        --border-color:      #334155;
        --accent:            #f5a623;
        --accent-hover:      #e09000;
        --accent-dark:       #0f172a;
        --link-color:        #60a5fa;
        --nav-bg:            #1e293b;
        --dropdown-bg:       #1e293b;
        color-scheme: dark;
      }

      html[data-theme="light"] {
        --bg-primary:        #f1f5f9;
        --bg-card:           #ffffff;
        --bg-input:          #f8fafc;
        --bg-secondary:      #e2e8f0;
        --bg-secondary-hover:#cbd5e1;
        --text-primary:      #1e293b;
        --text-muted:        #64748b;
        --text-subtle:       #94a3b8;
        --text-heading-2:    #1e293b;
        --text-heading-3:    #334155;
        --border-color:      #e2e8f0;
        --accent:            #f5a623;
        --accent-hover:      #e09000;
        --accent-dark:       #0f172a;
        --link-color:        #2563eb;
        --nav-bg:            #ffffff;
        --dropdown-bg:       #ffffff;
        color-scheme: light;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        transition: background 0.2s, color 0.2s;
      }
      a { color: var(--link-color); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <app-shell></app-shell>
    <script type="module" src="/src/app-shell.ts"></script>
  </body>
</html>
